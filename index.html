<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="description" content="迷你多人RTS - 实时战略游戏，支持多人联机对战">
    <meta name="theme-color" content="#667eea">
    <title>⚔️ 迷你多人RTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
    <div class="game-container">
        <!-- 顶部信息栏 -->
        <header class="top-bar">
            <div class="player-info">
                <div class="player-badge">
                    <span class="label">玩家</span>
                    <span id="playerId" class="value">--</span>
                </div>
                <div class="resources">
                    <div class="resource gold">
                        <span class="icon">💰</span>
                        <span class="value" id="gold">100</span>
                    </div>
                    <div class="resource wood">
                        <span class="icon">🪵</span>
                        <span class="value" id="wood">100</span>
                    </div>
                </div>
            </div>
            <div class="status-area">
                <div class="connection-status">
                    <span id="status" class="status disconnected">
                        <span class="dot"></span>
                        <span class="text">未连接</span>
                    </span>
                </div>
                <button id="startBtn" class="btn btn-primary">
                    <span class="btn-icon">▶️</span>
                    <span class="btn-text">开始游戏</span>
                </button>
            </div>
        </header>

        <!-- 游戏画布 -->
        <main class="game-area">
            <canvas id="gameCanvas"></canvas>
            <!-- 游戏提示 -->
            <div class="game-tips" id="gameTips">
                <div class="tip">🖱️ 左键：建造/训练/选择</div>
                <div class="tip">🖱️ 右键：移动/攻击</div>
            </div>
        </main>

        <!-- 底部控制面板 -->
        <footer class="bottom-panel">
            <section class="buildings">
                <h3 class="panel-title">🏗️ 建筑</h3>
                <div class="button-group">
                    <button class="btn build" data-type="barracks" data-gold="50" data-wood="30">
                        <span class="btn-icon">🏚️</span>
                        <span class="btn-label">兵营</span>
                    </button>
                    <button class="btn build" data-type="gold-mine" data-gold="20" data-wood="40">
                        <span class="btn-icon">⛏️</span>
                        <span class="btn-label">金矿</span>
                    </button>
                    <button class="btn build" data-type="lumber-camp" data-gold="30" data-wood="20">
                        <span class="btn-icon">🪓</span>
                        <span class="btn-label">伐木场</span>
                    </button>
                </div>
            </section>
            <section class="units">
                <h3 class="panel-title">⚔️ 单位</h3>
                <div class="button-group">
                    <button class="btn train" data-type="soldier" data-gold="50" data-wood="20">
                        <span class="btn-icon">⚔️</span>
                        <span class="btn-label">士兵</span>
                    </button>
                    <button class="btn train" data-type="worker" data-gold="25" data-wood="10">
                        <span class="btn-icon">👷</span>
                        <span class="btn-label">工人</span>
                    </button>
                </div>
            </section>
        </footer>
    </div>

    <!-- 游戏结束弹窗 -->
    <div id="gameOver" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-icon" id="gameOverIcon">🏆</div>
            <h2 id="gameOverTitle">游戏结束</h2>
            <p id="gameOverText"></p>
            <button id="restartBtn" class="btn btn-primary btn-large">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">再来一局</span>
            </button>
        </div>
    </div>

    <!-- 连接中提示 -->
    <div id="connectingOverlay" class="connecting-overlay hidden">
        <div class="spinner"></div>
        <p>正在连接服务器...</p>
    </div>

    <!-- 离线提示 -->
    <div id="offlineNotice" class="offline-notice hidden">
        <div class="offline-content">
            <div class="offline-icon">⚠️</div>
            <h3>离线模式</h3>
            <p>无法连接到游戏服务器</p>
            <p class="offline-hint">请检查：</p>
            <ul>
                <li>后端服务是否已启动</li>
                <li>网络连接是否正常</li>
                <li>SERVER_URL 配置是否正确</li>
            </ul>
            <button class="btn btn-primary" onclick="location.reload()">重新连接</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
